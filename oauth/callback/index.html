<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MMU — Authorization Complete</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; max-width: 720px;
         margin: 0 auto; padding: 48px 24px; line-height: 1.7; }
  h1 { font-size: 1.4rem; }
  code, .box { font-family: Consolas, monospace; }
  .box { display: block; padding: 12px 16px; margin: 12px 0; border-radius: 8px;
         background: rgba(127,127,127,.12); word-break: break-all; user-select: all; }
  button { padding: 8px 20px; border-radius: 8px; border: 1px solid rgba(127,127,127,.4);
           background: #2563eb; color: #fff; font-size: 1rem; cursor: pointer; }
  .ok { color: #16a34a; } .err { color: #dc2626; }
  .muted { opacity: .7; font-size: .9rem; }
</style>
</head>
<body>
<h1>MMU — Authorization</h1>
<div id="content"><p class="muted">Reading authorization response…</p></div>
<script>
(function () {
  var q = new URLSearchParams(location.search);
  var el = document.getElementById("content");
  var err = q.get("error") || q.get("error_description");
  var code = q.get("code");
  if (err) {
    el.innerHTML = '<p class="err">Authorization failed: <code></code></p>' +
      '<p class="muted">Close this page and run <code>mmu auth login</code> again.</p>';
    el.querySelector("code").textContent = err;
    return;
  }
  if (!code) {
    el.innerHTML = '<p class="muted">No authorization code in the URL. ' +
      'This page is the OAuth redirect target for the MMU desktop tool; ' +
      'it does nothing on its own.</p>';
    return;
  }
  el.innerHTML =
    '<p class="ok">✔ Authorization succeeded.</p>' +
    '<p>Copy this code and paste it back into the waiting <code>mmu auth login</code> prompt:</p>' +
    '<span class="box" id="code"></span>' +
    '<button id="copy">Copy code</button> <span id="copied" class="ok"></span>' +
    '<p class="muted">Nothing is stored or sent by this page; the code only lives in your browser address bar.</p>';
  document.getElementById("code").textContent = code;
  document.getElementById("copy").onclick = function () {
    navigator.clipboard.writeText(code).then(function () {
      document.getElementById("copied").textContent = "copied";
    });
  };
})();
</script>
</body>
</html>
